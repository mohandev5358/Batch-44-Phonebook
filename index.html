<!DOCTYPE html>
<html>
<head>
    <title>Phonebook App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Phonebook Application</h2>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="phone" placeholder="Enter Phone">
        <input type="email" id="email" placeholder="Enter Email">

        <div style="display:flex;gap:10px;">
            <button onclick="addContact()">Add Contact</button>
            <button id="clearAllBtn" style="width:auto;background:#ef4444;">Clear All</button>
        </div>

        <br>

        <input type="text" id="search" placeholder="Search by name" onkeyup="searchContact()" class="search-row">
        <div id="formError" style="color:#dc2626;margin-top:6px;display:none"></div>

        <ul id="contactList"></ul>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
